# cargo-deny configuration for lsm-db.
# Schema reference: https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
all-features = true
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # Unmaintained-only advisories (not vulnerabilities) reached transitively
    # through `sled` — a DEV-ONLY dependency used solely by the comparative
    # benchmark `benches/comparison.rs`. Neither crate is in the shipped
    # dependency graph; the published `lsm-db` does not depend on them.
    "RUSTSEC-2025-0057", # fxhash: unmaintained (via sled)
    "RUSTSEC-2024-0384", # instant: unmaintained (via sled)
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
